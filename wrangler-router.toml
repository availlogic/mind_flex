# Wrangler configuration for the MindFlex Worker Router
name = "mindflex-router"
main = "brain-hub-homepage/cloudflare-router.js"
compatibility_date = "2025-09-01"

# Bind the Cloudflare KV namespace containing the dynamic games registry.
# Replace the id below with your actual KV Namespace ID generated by 'wrangler kv namespace create MINDFLEX_REGISTRY'
[[kv_namespaces]]
binding = "MINDFLEX_REGISTRY"
id = "667d22cdac224bdb9fd5d766ac77da39"
