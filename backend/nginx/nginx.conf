user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/json;

    upstream profile_service {
        server profile-service:8000;
    }

    upstream game_telemetry_service {
        server game-telemetry-service:8001;
    }

    server {
        listen 8080;

        # Profile service routes
        location /api/v1/profiles {
            proxy_pass http://profile_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Client-Timezone-Offset $http_x_client_timezone_offset;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Game telemetry routes
        location /api/v1/games {
            proxy_pass http://game_telemetry_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Client-Timezone-Offset $http_x_client_timezone_offset;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health
        location = /healthz {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }
    }
}
